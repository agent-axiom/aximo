apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aximo-ingress
  labels:
    app.kubernetes.io/name: aximo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: aximo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
