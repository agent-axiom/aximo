[server]
# The main server fields, inference defaults, and limits can also be overridden
# by AXIMO_* environment variables. See README.md for the supported list.
host = "0.0.0.0"
port = 8080

[inference]
models_dir = "/var/lib/aximo/models"
default_offline_engine = "parakeet"
default_realtime_engine = "parakeet"

[inference.engines.parakeet]
kind = "parakeet"
path = "parakeet-tdt-0.6b-v3-int8"

[inference.engines.gigaam]
kind = "gigaam"
path = "giga-am-v3"

[limits]
max_short_audio_requests = 8
max_short_audio_bytes = 25000000
max_short_raw_pcm_bytes = 1920000
max_short_audio_duration_ms = 60000
max_short_decoded_samples = 5760000
max_realtime_sessions = 24
max_short_inferences = 1
max_realtime_inferences = 1
max_realtime_session_bytes = 1920000
max_realtime_session_duration_ms = 60000
realtime_partial_min_interval_ms = 300
realtime_partial_min_chunk_bytes = 9600
realtime_event_channel_capacity = 64
